project:
  type: website
  output-dir: _site

website:
  title: "Yoram Gilboa"
  site-url: "https://gilboa.blog"
  description: "Economics, inflation, and labor market analysis through data visualization"
  draft-mode: unlinked
  favicon: favicon.png
  open-graph: true
  twitter-card:
    site: "@gilboa"

  navbar:
    background: primary
    left:
      - href: index.qmd
        text: Home
      - about.qmd
      - href: index.qmd
        text: Blog
    right:
      - icon: rss
        href: index.xml
      - icon: github
        href: https://github.com/YoramGilboa

  page-footer:
    left: "© 2025-2026 Gilboa"
    right:
      - text: About
        href: about.qmd
      - text: RSS
        href: index.xml

format:
  html:
    theme: theme.scss
    css: styles.css
    html-math-method: katex
    toc: true
    toc-depth: 3
    code-fold: false
    code-tools: false
    code-copy: true

execute:
  freeze: auto
